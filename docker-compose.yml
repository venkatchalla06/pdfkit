version: "3.9"

# App is accessible at http://localhost:8080
# MinIO console at http://localhost:9005
# API docs at http://localhost:8080/api/docs

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdfkit}
      POSTGRES_USER: ${POSTGRES_USER:-pdfkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdfkit}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pdfkit"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9004:9000"   # MinIO S3 API (browser upload target)
      - "9005:9001"   # MinIO web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${AWS_ACCESS_KEY_ID:-minioadmin} ${AWS_SECRET_ACCESS_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET:-pdfkit};
      mc anonymous set download local/${S3_BUCKET:-pdfkit}/results;
      echo 'MinIO bucket ready';
      "
    restart: on-failure

  clamav:
    image: clamav/clamav:stable
    platform: linux/amd64   # no arm64 image; runs via Rosetta on Apple Silicon
    volumes:
      - clamav-db:/var/lib/clamav
    restart: unless-stopped

  # ── Application ────────────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
      target: production
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://pdfkit:${POSTGRES_PASSWORD:-pdfkit}@postgres:5432/pdfkit
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_PUBLIC_URL=http://localhost:9004
      - CLAMAV_HOST=clamav
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./backend
      target: production
    command: celery -A app.workers.celery_app worker -Q default -c 4 --loglevel=info
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://pdfkit:${POSTGRES_PASSWORD:-pdfkit}@postgres:5432/pdfkit
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - S3_ENDPOINT_URL=http://minio:9000
      - CLAMAV_HOST=clamav
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-ocr:
    build:
      context: ./backend
      target: production
    command: celery -A app.workers.celery_app worker -Q ocr,ai -c 1 --loglevel=info
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://pdfkit:${POSTGRES_PASSWORD:-pdfkit}@postgres:5432/pdfkit
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - S3_ENDPOINT_URL=http://minio:9000
      - CLAMAV_HOST=clamav
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      target: production
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=/api/v1
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
    restart: unless-stopped

  # ── Nginx gateway on port 9000 ─────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"    # ← App is at http://localhost:8080
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  clamav-db:
